name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'

jobs:
  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run lint
        run: composer lint
